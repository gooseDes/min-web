name: "publish"

on:
    push:
        branches:
            - release

jobs:
    bump-and-sync-version:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            new_tag: ${{ steps.version_bump.outputs.tag }}
            skipped: ${{ steps.version_bump.outputs.skipped }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  persist-credentials: true

            - name: Automated Version Bump on Release
              id: version_bump
              uses: TriPSs/conventional-changelog-action@v6
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  version-file: "apps/desktop/package.json"
                  tag-prefix: "app-v"
                  git-message: "chore: bump desktop app version to {version} [skip ci]"
                  git-branch: "release"
                  output-file: "false"

            - name: Switch Git Runner to Main Branch
              if: steps.version_bump.outputs.skipped == 'false'
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b main origin/main
                  git pull origin main

            - name: Sync Version Bump to Main Branch
              if: steps.version_bump.outputs.skipped == 'false'
              uses: TriPSs/conventional-changelog-action@v6
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  version-file: "apps/desktop/package.json"
                  tag-prefix: "app-v"
                  git-message: "chore: bump desktop app version to {version} [skip ci]"
                  git-branch: "main"
                  output-file: "false"
                  create-status: "false"
                  skip-tag: "true"

    publish-tauri:
        needs: bump-and-sync-version
        if: needs.bump-and-sync-version.outputs.skipped == 'false'
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: "macos-latest"
                      args: "--target aarch64-apple-darwin"
                    - platform: "macos-latest"
                      args: "--target x86_64-apple-darwin"
                    - platform: "ubuntu-22.04"
                      args: ""
                    - platform: "windows-latest"
                      args: ""

        runs-on: ${{ matrix.platform }}
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ needs.bump-and-sync-version.outputs.new_tag }} # Check out the exact tag created in Job 1
                  fetch-depth: 0

            - name: create .env
              shell: bash
              run: |
                  printf '%s' "$ENV_FILE" > apps/web/.env
              env:
                  ENV_FILE: ${{ secrets.ENV_FILE }}

            - name: install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: pnpm

            - name: install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: install dependencies (ubuntu only)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

            - name: install frontend dependencies
              run: pnpm install

            - uses: tauri-apps/tauri-action@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  tagName: ${{ needs.bump-and-sync-version.outputs.new_tag }}
                  releaseName: "Min Desktop ${{ needs.bump-and-sync-version.outputs.new_tag }}"
                  generateReleaseNotes: true
                  releaseDraft: false
                  prerelease: false
                  args: ${{ matrix.args }}
                  projectPath: "./apps/desktop"
                  buildScriptName: "build"
                  includeUpdaterJson: true

            - name: Build and Upload Arch Linux Package (.pkg.tar.zst)
              if: matrix.platform == 'ubuntu-22.04'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ needs.bump-and-sync-version.outputs.new_tag }}"
                  VERSION="${TAG#app-v}"

                  mkdir -p arch-build
                  cp PKGBUILD arch-build/

                  DEB_PATH=$(ls apps/desktop/src-tauri/target/release/bundle/deb/*.deb | head -n 1)
                  DEB_NAME=$(basename "$DEB_PATH")
                  cp "$DEB_PATH" arch-build/

                  chmod -R o+rwx arch-build

                  docker run --rm \
                    -e VERSION="$VERSION" \
                    -e DEB_NAME="$DEB_NAME" \
                    -v "$(pwd)/arch-build":/workspace \
                    -w /workspace \
                    archlinux:latest bash -c "
                      pacman -Syu --noconfirm base-devel pacman-contrib

                      useradd -m builder
                      echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
                      chown -R builder:builder /workspace

                      sed -i \"s/pkgver=.*/pkgver=\$VERSION/\" PKGBUILD
                      sed -i \"s|source=.*|source=(\"\$DEB_NAME\")|\" PKGBUILD

                      su builder -c 'updpkgsums && makepkg -sc --noconfirm'
                    "

                  gh release upload "$TAG" arch-build/*.pkg.tar.zst
