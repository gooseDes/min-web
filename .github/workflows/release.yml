name: "publish"

on:
    push:
        branches:
            - release

jobs:
    publish-tauri:
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: "macos-latest"
                      args: "--target aarch64-apple-darwin"
                    - platform: "macos-latest"
                      args: "--target x86_64-apple-darwin"
                    - platform: "ubuntu-22.04"
                      args: ""
                    - platform: "windows-latest"
                      args: ""

        runs-on: ${{ matrix.platform }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: create .env
              shell: bash
              run: |
                  printf '%s' "$ENV_FILE" > apps/web/.env
              env:
                  ENV_FILE: ${{ secrets.ENV_FILE }}

            - name: Automated Version Bump
              id: version_bump
              uses: TriPSs/conventional-changelog-action@v6
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  version-file: "apps/desktop/package.json"
                  tag-prefix: "app-v"
                  git-message: "chore: bump desktop app version to {version} [skip ci]"
                  target-branch: "release"
                  output-file: "false"

            - name: install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: pnpm

            - name: install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: install dependencies (ubuntu only)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

            - name: install frontend dependencies
              run: pnpm install

            - uses: tauri-apps/tauri-action@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  tagName: app-v${{ steps.version_bump.outputs.tag }}
                  releaseName: "Min Desktop v${{ steps.version_bump.outputs.tag }}"
                  generateReleaseNotes: true
                  releaseDraft: false
                  prerelease: false
                  args: ${{ matrix.args }}
                  projectPath: "./apps/desktop"
                  buildScriptName: "build"
                  includeUpdaterJson: true
